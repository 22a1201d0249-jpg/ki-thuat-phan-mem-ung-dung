<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUỆ THU SPORT - Quản Trị Shop</title>
  <script src="https://cdn.tailwindcss.com/3.4.1?silent=true"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
  --bg: #0B0B0F;            /* nền chính: đen */
  --bg2: #111118;           /* nền phụ */
  --card: #18181F;          /* nền card */
  --card-hover: #1F1F28;    /* hover card */
  --border: #2A2A36;        /* viền */

  --fg: #F0F0F5;            /* chữ */

  --muted: #7A7A8E;         /* chữ phụ */

  --accent: #2563EB;        /* xanh dương chủ đạo */
  --accent-hover: #3B82F6;  /* xanh sáng khi hover */
  --accent-glow: rgba(37,99,235,0.25); /* glow xanh */

  --success: #00C853;
  --danger: #FF1744;
  --warning: #FFAB00;
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Source Sans 3',sans-serif; background:var(--bg); color:var(--fg); }
    .font-display { font-family:'Oswald',sans-serif; }
    .input-field { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--fg); width:100%; font-size:14px; transition:border-color 0.2s; outline:none; font-family:inherit; }
    .input-field:focus { border-color:var(--accent); }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px 16px; text-align:left; border-bottom:1px solid var(--border); font-size:14px; }
    th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
    tr:hover td { background:rgba(255,255,255,0.02); }
    .badge { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; }
    .badge-success { background:rgba(0,200,83,0.12); color:var(--success); }
    .badge-danger { background:rgba(255,23,68,0.12); color:var(--danger); }
    .badge-warning { background:rgba(255,171,0,0.12); color:var(--warning); }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s; backdrop-filter:blur(4px); }
    .modal-overlay.active { opacity:1; pointer-events:auto; }
    .modal-content { background:var(--card); border:1px solid var(--border); border-radius:14px; max-height:90vh; overflow-y:auto; width:95%; transform:scale(0.95); transition:transform 0.25s; }
    .modal-overlay.active .modal-content { transform:scale(1); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-[var(--border)] sticky top-0 z-50" style="background:rgba(11,11,15,0.9);backdrop-filter:blur(12px);">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="font-display text-xl font-bold tracking-wider"><span style="color:var(--accent);">HUỆ THU</span> <span class="text-white">SPORT</span></div>
        <span class="text-xs font-semibold px-2 py-1 rounded bg-[var(--accent)] text-white uppercase">Admin</span>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="loadData()" class="h-9 px-4 rounded-lg bg-[var(--accent)] text-white text-sm font-semibold hover:bg-[var(--accent-hover)] transition flex items-center gap-2">
          <i class="fa-solid fa-rotate"></i> Làm mới dữ liệu
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Stats -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="p-5 rounded-xl border border-[var(--border)]" style="background:var(--card);">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[var(--muted)] text-sm font-medium">Tài khoản</span>
        </div>
        <div class="font-display text-3xl font-bold text-white" id="stat-users">0</div>
      </div>
      <div class="p-5 rounded-xl border border-[var(--border)]" style="background:var(--card);">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[var(--muted)] text-sm font-medium">Đơn hàng</span>
        </div>
        <div class="font-display text-3xl font-bold text-white" id="stat-orders">0</div>
      </div>
      <div class="p-5 rounded-xl border border-[var(--border)]" style="background:var(--card);">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[var(--muted)] text-sm font-medium">Doanh thu</span>
        </div>
        <div class="font-display text-3xl font-bold text-white" id="stat-revenue">0đ</div>
      </div>
            <div class="rounded-xl border border-[var(--border)] overflow-hidden" style="background:var(--card);">
        <div class="p-4 border-b border-[var(--border)] flex items-center gap-2">
          <i class="fa-solid fa-triangle-exclamation text-[var(--danger)] text-sm"></i>
          <span class="text-sm font-semibold text-white">Sắp hết hàng</span>
        </div>
        <div class="p-3" id="lowstock-list"></div>
      </div>
      <div class="rounded-xl border border-[var(--border)] overflow-hidden" style="background:var(--card);">
        <div class="p-4 border-b border-[var(--border)]">
          <h3 class="font-display text-base font-bold text-white">Sản phẩm sắp hết hàng</h3>
        </div>
        <div class="p-4" id="lowstock-list"></div>
      </div>
    </div>

    <!-- Accounts -->
    <div class="rounded-xl border border-[var(--border)] mb-8 overflow-hidden" style="background:var(--card);">
      <div class="p-4 border-b border-[var(--border)] flex items-center justify-between">
        <h2 class="font-display text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-users text-[#42A5F5]"></i> Danh Sách Tài Khoản Khách Hàng</h2>
        <input type="text" id="search-user" class="input-field w-64 text-sm" placeholder="Tìm email, tên..." oninput="filterUsers()">
      </div>
      <div class="overflow-x-auto">
        <table>
          <thead><tr><th>STT</th><th>Họ tên</th><th>Email</th><th>SĐT</th><th>Địa chỉ</th><th>Đơn hàng</th></tr></thead>
          <tbody id="user-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Orders -->
    <div class="rounded-xl border border-[var(--border)] overflow-hidden" style="background:var(--card);">
      <div class="p-4 border-b border-[var(--border)] flex items-center justify-between">
        <h2 class="font-display text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-receipt text-[var(--success)]"></i> Tất Cả Đơn Hàng</h2>
        <input type="text" id="search-order" class="input-field w-64 text-sm" placeholder="Tìm mã đơn, tên..." oninput="filterOrders()">
      </div>
      <div class="overflow-x-auto">
        <table>
          <thead><tr><th>Mã Đơn</th><th>Khách hàng</th><th>Ngày đặt</th><th>Thanh toán</th><th>Tổng tiền</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
          <tbody id="order-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal Chi tiết đơn hàng -->
  <div id="detail-modal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-content w-full max-w-2xl p-0 relative">
      <div class="p-4 border-b border-[var(--border)] flex items-center justify-between">
        <h3 class="font-display text-lg font-bold text-white">Chi Tiết Đơn Hàng</h3>
        <button class="w-7 h-7 rounded-md flex items-center justify-center text-[var(--muted)] hover:text-[var(--fg)] hover:bg-[var(--bg)] transition" onclick="closeDetailModal()"><i class="fa-solid fa-xmark text-sm"></i></button>
      </div>
      <div id="detail-content" class="p-5"></div>
    </div>
  </div>

  <script>
    // --- TIỆN ÍCH ---
    function formatPrice(n) { return n.toLocaleString('vi-VN') + 'đ'; }
    function getContrastColor(hex) { var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (0.299*r+0.587*g+0.114*b)/255>0.55?'#1a1a1a':'#ffffff'; }
    function adjustColor(hex,amount) { var r=Math.max(0,Math.min(255,parseInt(hex.slice(1,3),16)+amount)),g=Math.max(0,Math.min(255,parseInt(hex.slice(3,5),16)+amount)),b=Math.max(0,Math.min(255,parseInt(hex.slice(5,7),16)+amount)); return '#'+[r,g,b].map(function(c){return c.toString(16).padStart(2,'0')}).join(''); }
    function escapeXml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderProductIcon(type, color, w, h, opts, id) {
      var tc=getContrastColor(color),bc=adjustColor(color,-30),lc=adjustColor(color,20),svgId=id||'icon';
      var name=(opts&&opts.name)||'',number=(opts&&opts.number)||'',sockType=(opts&&opts.sockType)||'short';
      var s='<svg viewBox="0 0 200 200" width="'+w+'" height="'+h+'" xmlns="http://www.w3.org/2000/svg">';
      s+='<defs><linearGradient id="bg-'+svgId+'" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:'+lc+'"/><stop offset="100%" style="stop-color:'+bc+'"/></linearGradient></defs>';
      s+='<rect x="6" y="6" width="188" height="188" rx="40" fill="url(#bg-'+svgId+')"/>';
      var sw='stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"';
      if(type==='shirt'){s+='<g transform="translate(100,100)"><path d="M-32-55 L-42-48 L-66-56 L-56-10 L-40-20 L-40 52 L40 52 L40-20 L56-10 L66-56 L42-48 L32-55 Q0-40 -32-55Z" '+sw+'/>';if(name)s+='<text x="0" y="10" text-anchor="middle" font-family="Oswald,sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.85" letter-spacing="2" textLength="90" lengthAdjust="spacingAndGlyphs">'+escapeXml(name)+'</text>';if(number)s+='<text x="0" y="42" text-anchor="middle" font-family="Oswald,sans-serif" font-size="38" font-weight="700" fill="white" opacity="0.85">'+escapeXml(number)+'</text>';s+='</g>';}
      else if(type==='shorts'){s+='<g transform="translate(100,102)"><path d="M-38-45 L-38-32 L-58 50 L-6 50 L0 8 L6 50 L58 50 L38-32 L38-45 Q0-34 -38-45Z" '+sw+'/>';if(number)s+='<text x="0" y="18" text-anchor="middle" font-family="Oswald,sans-serif" font-size="32" font-weight="700" fill="white" opacity="0.85">'+escapeXml(number)+'</text>';s+='</g>';}
      else if(type==='kit'){s+='<g transform="translate(100,100)"><path d="M-20-62 L-26-58 L-46-62 L-38-30 L-26-36 L-26-6 L26-6 L26-36 L38-30 L46-62 L26-58 L20-62 Q0-50 -20-62Z" '+sw+'/><path d="M-20 0 L-36 60 L-4 60 L0 32 L4 60 L36 60 L20 0 Q0 4 -20 0Z" '+sw+'/>';if(name)s+='<text x="0" y="-28" text-anchor="middle" font-family="Oswald,sans-serif" font-size="10" font-weight="600" fill="white" opacity="0.8" letter-spacing="1" textLength="70" lengthAdjust="spacingAndGlyphs">'+escapeXml(name)+'</text>';if(number)s+='<text x="0" y="-46" text-anchor="middle" font-family="Oswald,sans-serif" font-size="24" font-weight="700" fill="white" opacity="0.85">'+escapeXml(number)+'</text>';s+='</g>';}
      else if(type==='socks'){var oy=sockType==='long'?-8:12,sy=sockType==='long'?1.1:0.72;s+='<g transform="translate(100,100) scale(0.82,'+sy+') translate(0,'+oy+')"><rect x="-14" y="-72" width="28" height="10" rx="3" '+sw+' stroke-width="2" opacity="0.5"/><path d="M-10,-63 L10,-63 L10,-5 L55,-5 Q68,-5 68,8 Q68,22 55,22 L-5,22 Q-18,22 -18,10 L-18,-1 Q-18,-5 -10,-5 Z" '+sw+'/></g>';}
      else if(type==='shoes'){s+='<g transform="translate(100,108) scale(0.85)"><rect x="-80" y="0" width="165" height="16" rx="6" '+sw+' stroke-width="3" opacity="0.7"/><path d="M-72,0 L-68,-18 Q-65,-30 -50,-36 L-15,-44 Q5,-48 25,-44 L55,-36 Q70,-30 75,-18 L82,0" '+sw+'/><path d="M-68,-18 Q-30,-32 5,-34 Q40,-32 65,-18" stroke="white" stroke-width="2" fill="none" opacity="0.3"/></g>';}
      s+='</svg>';return s;
    }

    // --- DỮ LIỆU TOÀN CỤC ---
    var allAccounts = [];
    var allOrders = [];
    var allProducts = [];

    function loadData() {
  allProducts = JSON.parse(localStorage.getItem('sf_products')) || [];
  allOrders = [];

  // Quét tất cả key trong localStorage tìm sf_orders_
  for (var k = 0; k < localStorage.length; k++) {
    var key = localStorage.key(k);
    if (key.indexOf('sf_orders_') === 0) {
      var orders = JSON.parse(localStorage.getItem(key)) || [];
      var email = key.replace('sf_orders_', '');
      // Tìm tên khách từ tài khoản
      var accounts = JSON.parse(localStorage.getItem('sf_accounts')) || [];
      var acc = accounts.find(function(a) { return a.email === email; });
      var customerName = acc ? acc.name : email;
      orders.forEach(function(o) {
        o.customerEmail = email;
        o.customerName = customerName;
      });
      allOrders = allOrders.concat(orders);
    }
  }

  allOrders.sort(function(a, b) { return b.id.localeCompare(a.id); });
  allAccounts = JSON.parse(localStorage.getItem('sf_accounts')) || [];

  renderStats();
  renderUsers(allAccounts);
  renderOrders(allOrders);

  // Debug: hiện số lượng key tìm được
  console.log('Tìm thấy ' + allOrders.length + ' đơn hàng');
}
    function renderStats() {
  document.getElementById('stat-users').textContent = allAccounts.length;
  document.getElementById('stat-orders').textContent = allOrders.length;
  var revenue = 0;
  allOrders.forEach(function(o) { revenue += o.total; });
  document.getElementById('stat-revenue').textContent = formatPrice(revenue);

  var lowStock = allProducts.filter(function(p) { return p.stock <= 5; });
  var container = document.getElementById('lowstock-list');
  if (lowStock.length === 0) {
    container.innerHTML = '<p class="text-xs text-[var(--muted)] text-center py-2">Tất cả còn hàng</p>';
  } else {
    var html = '';
    lowStock.forEach(function(p) {
      var sc = p.stock === 0 ? 'var(--danger)' : 'var(--warning)';
      var st = p.stock === 0 ? 'Hết hàng' : 'Còn ' + p.stock;
      html += '<div class="flex items-center gap-2 py-1.5">' +
        '<div style="width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:' + p.colors[0] + '15;">' +
        renderProductIcon(p.type, p.colors[0], 20, 25, {}, 'ls'+p.id) +
        '</div>' +
        '<div style="flex:1;min-width:0;" class="truncate"><span class="text-xs font-medium text-white truncate block">' + p.name + '</span></div>' +
        '<span class="text-[10px] font-semibold shrink-0" style="color:' + sc + ';">' + st + '</span></div>';
    });
    container.innerHTML = html;
  }
}

    function renderUsers(data) {
  var tbody = document.getElementById('user-tbody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-[var(--muted)] py-8">Chưa có tài khoản khách hàng nào</td></tr>';
    return;
  }
  var html = '';
  data.forEach(function(u, i) {
    // Lấy SĐT và địa chỉ từ đơn hàng gần nhất
    var phone = '-', address = '-';
    var orderKey = 'sf_orders_' + u.email;
    var orders = JSON.parse(localStorage.getItem(orderKey)) || [];
    if (orders.length > 0) {
      var last = orders[0];
      phone = last.phone || '-';
      address = last.address || '-';
    }

    // Đếm số đơn hàng
    var orderCount = orders.length;

    html += '<tr>' +
      '<td class="text-[var(--muted)]">' + (i+1) + '</td>' +
      '<td class="font-medium text-white">' + u.name + '</td>' +
      '<td class="text-[var(--accent)]">' + u.email + '</td>' +
      '<td class="text-sm">' + phone + '</td>' +
      '<td class="text-sm max-w-[250px] truncate text-[var(--muted)]" title="' + escapeXml(address) + '">' + address + '</td>' +
      '<td class="text-center"><span class="badge badge-success">' + orderCount + ' đơn</span></td>' +
      '</tr>';
  });
  tbody.innerHTML = html;
}
    function renderOrders(data) {
      var tbody = document.getElementById('order-tbody');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-[var(--muted)] py-8">Chưa có đơn hàng nào</td></tr>';
        return;
      }
      var html = '';
      data.forEach(function(o) {
        var payLabel = o.payment === 'cod' ? 'Tiền mặt' : 'Chuyển khoản';
        var payBadge = o.payment === 'cod' ? 'badge-success' : 'badge-warning';
        
        html += '<tr>' +
          '<td class="font-display font-semibold text-[var(--accent)]">' + o.id + '</td>' +
          '<td><div class="font-medium text-white">' + o.name + '</div><div class="text-xs text-[var(--muted)]">' + o.customerEmail + '</div></td>' +
          '<td class="text-[var(--muted)] text-sm">' + o.date + '</td>' +
          '<td><span class="badge ' + payBadge + '">' + payLabel + '</span></td>' +
          '<td class="font-display font-bold text-white">' + formatPrice(o.total) + '</td>' +
          '<td><span class="badge badge-success">Chờ xác nhận</span></td>' +
          '<td><button onclick="viewDetail(\'' + o.id + '\')" class="text-sm text-[var(--accent)] hover:underline font-medium">Xem chi tiết</button></td>' +
          '</tr>';
      });
      tbody.innerHTML = html;
    }

    function viewDetail(orderId) {
      var order = allOrders.find(function(o) { return o.id === orderId; });
      if (!order) return;

      var payLabel = order.payment === 'cod' ? 'Tiền mặt' : 'Chuyển khoản';
      
      var itemsHtml = '';
      order.items.forEach(function(item) {
        var desc = item.colorName;
        if (item.printName) desc += ' | In: ' + item.printName;
        if (item.printNumber) desc += ' #' + item.printNumber;
        if (item.productType === 'socks') desc += ' | Tất ' + (item.sockType === 'long' ? 'cổ dài' : 'cổ ngắn');

        var iconW = 30, iconH = 38;
        if (item.productType === 'socks') { iconW = 16; iconH = 38; }
        if (item.productType === 'shoes') { iconW = 40; iconH = 25; }
        if (item.productType === 'kit') { iconW = 26; iconH = 38; }

        itemsHtml += '<div class="flex items-center gap-3 py-3 border-b border-[var(--border)]">' +
          '<div style="width:45px;height:45px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:' + item.colorHex + '15;">' +
          renderProductIcon(item.productType, item.colorHex, iconW, iconH, {name:item.printName, number:item.printNumber, sockType:item.sockType}, 'od'+item.productId) +
          '</div>' +
          '<div style="flex:1;min-width:0;"><div class="text-sm font-medium text-white truncate">' + item.productName + '</div>' +
          '<div class="text-xs text-[var(--muted)]">' + desc + '</div></div>' +
          '<div class="text-right shrink-0"><div class="text-sm font-bold text-white">' + formatPrice(item.price * item.quantity) + '</div>' +
          '<div class="text-xs text-[var(--muted)]">x' + item.quantity + '</div></div></div>';
      });

      var html = '<div class="space-y-4">' +
        '<div class="grid grid-cols-2 gap-4 p-3 rounded-lg" style="background:var(--bg);">' +
          '<div><span class="text-xs text-[var(--muted)]">Mã đơn hàng</span><div class="font-display font-bold text-[var(--accent)]">' + order.id + '</div></div>' +
          '<div><span class="text-xs text-[var(--muted)]">Ngày đặt</span><div class="text-sm font-medium text-white">' + order.date + '</div></div>' +
          '<div><span class="text-xs text-[var(--muted)]">Khách hàng</span><div class="text-sm font-medium text-white">' + order.name + '</div></div>' +
          '<div><span class="text-xs text-[var(--muted)]">Email</span><div class="text-sm text-[var(--muted)]">' + order.customerEmail + '</div></div>' +
          '<div><span class="text-xs text-[var(--muted)]">SĐT</span><div class="text-sm text-white">' + (order.phone || '-') + '</div></div>' +
          '<div><span class="text-xs text-[var(--muted)]">Thanh toán</span><div class="text-sm text-white">' + payLabel + '</div></div>' +
        '</div>' +
        '<div><span class="text-xs text-[var(--muted)]">Địa chỉ giao hàng</span><div class="text-sm text-white mt-1 p-2 rounded" style="background:var(--bg);">' + (order.address || '-') + '</div></div>' +
        '<div><span class="text-xs text-[var(--muted)] block mb-2">Chi tiết sản phẩm</span>' + itemsHtml + '</div>' +
        '<div class="flex items-center justify-between pt-2 border-t border-[var(--border)]">' +
          '<span class="font-semibold text-white">Tổng cộng:</span>' +
          '<span class="font-display text-2xl font-bold" style="color:var(--accent);">' + formatPrice(order.total) + '</span></div></div>';

      document.getElementById('detail-content').innerHTML = html;
      document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }

    // --- BỘ LỌC ---
    function filterUsers() {
      var q = document.getElementById('search-user').value.toLowerCase();
      var filtered = allAccounts.filter(function(u) {
        return u.name.toLowerCase().indexOf(q) !== -1 || u.email.toLowerCase().indexOf(q) !== -1;
      });
      renderUsers(filtered);
    }

    function filterOrders() {
      var q = document.getElementById('search-order').value.toLowerCase();
      var filtered = allOrders.filter(function(o) {
        return o.id.toLowerCase().indexOf(q) !== -1 || o.name.toLowerCase().indexOf(q) !== -1 || o.customerEmail.toLowerCase().indexOf(q) !== -1;
      });
      renderOrders(filtered);
    }

    // Đóng modal khi click overlay
    document.getElementById('detail-modal').addEventListener('click', function(e) {
      if (e.target === this) closeDetailModal();
    });

    // Tự động load lần đầu
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
